name: CI

on:
  push:
    branches: ["main", "cursor/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Install SQLite dev headers
        run: sudo apt-get install -y libsqlite3-dev

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (with race detector)
        run: go test ./... -count=1 -race -timeout 120s

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Install SQLite dev headers
        run: sudo apt-get install -y libsqlite3-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
